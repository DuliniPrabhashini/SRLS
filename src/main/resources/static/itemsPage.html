<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Page</title>
    <link rel="stylesheet" href="StyleSheets/item.css">
    <script src="js/itemScript.js"></script>
</head>
<body>
<div class="navbar">

  <h2>Item Management</h2>

  <button onclick="goBack()">Dashboard</button>

</div>

<div class="container">
  <!-- Item Form -->
  <div class="form-card">
    <h2>Add / Update Item</h2>
    <input type="hidden" id="itemId">

    <input type="text"
           id="itemName"
           placeholder="Item Name">

    <input type="number"
           id="quantity"
           placeholder="Quantity">

    <input type="number"
           id="price"
           placeholder="Price">

    <div>
      <button id="saveButton" class="save">
        Save
      </button>

      <button id="updateButton" class="update">
        Update
      </button>
    </div>

  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text"
           id="searchText"
           placeholder="Search Item...">

    <button id="searchButton">
      Search
    </button>

  </div>

  <!-- Table -->
  <div class="table-card">
    <h2>Stock Items</h2>

    <table>
      <thead>
      <tr>

        <th>ID</th>

        <th>Item Name</th>

        <th>Quantity</th>

        <th>Price</th>

        <th>Actions</th>

      </tr>
      </thead>

      <tbody id="itemTableBody">
      <tr>

        <td>1</td>

        <td>Baby Hair Clip</td>

        <td>50</td>

        <td>150</td>

        <td>

          <button id="editButton" class="edit">
            Edit
          </button>

          <button id="deleteButton" class="delete">
            Delete
          </button>

        </td>
      </tr>
      </tbody>

    </table>

  </div>
</div>
</body>
</html>
